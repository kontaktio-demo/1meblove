<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 220" role="img" aria-label="Meblove.com.pl — Design studio">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@600&amp;family=Inter:wght@500&amp;display=swap');
      .brand { font-family: 'Caveat', 'Segoe Script', cursive; font-weight: 600; font-size: 140px; fill: #0F0E0D; }
      .sub   { font-family: 'Inter', sans-serif; font-weight: 500; font-size: 22px; letter-spacing: .28em; fill: #0F0E0D; text-transform: uppercase; }
